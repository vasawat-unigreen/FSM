# Netlify configuration. The Next.js runtime is declared explicitly so it runs
# even when the repo is linked via the API/deploy-key method (auto-detection
# only fires for GitHub-App-connected sites). `prisma generate` runs via the
# package.json `postinstall` hook before the build.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Required environment variables (set in Netlify UI → Site settings → Env vars):
#   DATABASE_URL      pooled Postgres connection string (e.g. Neon -pooler URL)
#   AUTH_SECRET       openssl rand -base64 32
#   STORAGE_DRIVER    blobs   (use Netlify Blobs for uploaded photos/signatures)
